name: 🔄 Keep Alive - zo.computer

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping fuli.zo.computer
        id: ping_fuli
        continue-on-error: true
        run: |
          echo "⏰ Ping at: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 --retry 2 \
            https://fuli.zo.computer/)
          echo "fuli.zo.computer HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Ping dns.zo.computer
        id: ping_dns
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 --retry 2 \
            https://dns.zo.computer)
          echo "dns.zo.computer HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Ping xox.zo.computer
        id: ping_xox
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 --retry 2 \
            https://xox.zo.computer)
          echo "xox.zo.computer HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: 🚨 Telegram 失败通知
        if: steps.ping_fuli.outcome == 'failure' || steps.ping_dns.outcome == 'failure' || steps.ping_xox.outcome == 'failure'
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          FULI_OUTCOME: ${{ steps.ping_fuli.outcome }}
          DNS_OUTCOME: ${{ steps.ping_dns.outcome }}
          XOX_OUTCOME: ${{ steps.ping_xox.outcome }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FAILED=""
          [ "$FULI_OUTCOME" = "failure" ] && FAILED="${FAILED}%0A%E2%9D%8C fuli.zo.computer"
          [ "$DNS_OUTCOME"  = "failure" ] && FAILED="${FAILED}%0A%E2%9D%8C dns.zo.computer"
          [ "$XOX_OUTCOME"  = "failure" ] && FAILED="${FAILED}%0A%E2%9D%8C xox.zo.computer"
          TIME=$(date '+%Y-%m-%d %H:%M UTC')
          MSG="%F0%9F%9A%A8 *zo.computer 保活告警*%0A%0A时间：${TIME}%0A失败站点：${FAILED}%0A%0A查看详情：${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown"
