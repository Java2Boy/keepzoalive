name: 🔄 Keep Alive - zo.computer

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    environment: ZO_API_KEY_DNS
    timeout-minutes: 10
    steps:
      - name: 🔄 Wake fuli.zo.computer
        id: wake_fuli
        continue-on-error: true
        env:
          ZO_KEY: ${{ secrets.ZO_API_KEY_FULI }}
        run: |
          echo "⏰ $(date '+%Y-%m-%d %H:%M:%S UTC')"
          RESP=$(curl -s -o /tmp/fuli.json -w "%{http_code}" \
            --max-time 60 --retry 2 \
            -X POST https://api.zo.computer/zo/ask \
            -H "Authorization: Bearer $ZO_KEY" \
            -H "Content-Type: application/json" \
            -d '{"input":"ping"}')
          echo "fuli HTTP $RESP"
          cat /tmp/fuli.json || true
          [ "$RESP" -ge 200 ] && [ "$RESP" -lt 500 ] || exit 1

      - name: 🔄 Wake xox.zo.computer
        id: wake_xox
        continue-on-error: true
        env:
          ZO_KEY: ${{ secrets.ZO_API_KEY_XOX }}
        run: |
          RESP=$(curl -s -o /tmp/xox.json -w "%{http_code}" \
            --max-time 60 --retry 2 \
            -X POST https://api.zo.computer/zo/ask \
            -H "Authorization: Bearer $ZO_KEY" \
            -H "Content-Type: application/json" \
            -d '{"input":"ping"}')
          echo "xox HTTP $RESP"
          cat /tmp/xox.json || true
          [ "$RESP" -ge 200 ] && [ "$RESP" -lt 500 ] || exit 1

      - name: 🔄 Wake dns.zo.computer
        id: wake_dns
        continue-on-error: true
        env:
          ZO_KEY: ${{ secrets.ZO_API_KEY_DNS }}
        run: |
          RESP=$(curl -s -o /tmp/dns.json -w "%{http_code}" \
            --max-time 60 --retry 2 \
            -X POST https://api.zo.computer/zo/ask \
            -H "Authorization: Bearer $ZO_KEY" \
            -H "Content-Type: application/json" \
            -d '{"input":"ping"}')
          echo "dns HTTP $RESP"
          cat /tmp/dns.json || true
          [ "$RESP" -ge 200 ] && [ "$RESP" -lt 500 ] || exit 1

      - name: 🚨 Telegram 失败通知
        if: steps.wake_fuli.outcome == 'failure' || steps.wake_xox.outcome == 'failure' || steps.wake_dns.outcome == 'failure'
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          FULI_OUT: ${{ steps.wake_fuli.outcome }}
          XOX_OUT: ${{ steps.wake_xox.outcome }}
          DNS_OUT: ${{ steps.wake_dns.outcome }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FAILED=""
          [ "$FULI_OUT" = "failure" ] && FAILED="$FAILED%0A❌ fuli.zo.computer"
          [ "$XOX_OUT"  = "failure" ] && FAILED="$FAILED%0A❌ xox.zo.computer"
          [ "$DNS_OUT"  = "failure" ] && FAILED="$FAILED%0A❌ dns.zo.computer"
          TIME=$(date '+%Y-%m-%d %H:%M UTC')
          MSG="🚨 zo.computer 保活告警%0A时间：$TIME%0A失败：$FAILED%0A详情：$RUN_URL"
          curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            -d "chat_id=$TG_CHAT" -d "text=$MSG"
